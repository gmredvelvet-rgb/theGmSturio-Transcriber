name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download FFmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp
          $ffmpegDir = Get-ChildItem -Path ffmpeg_temp -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Path "ffmpeg_bundle" -Force
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "ffmpeg_bundle\"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "ffmpeg_bundle\"

      - name: Build executable
        run: python build.py

      - name: Bundle FFmpeg with executable
        run: |
          Copy-Item -Path "ffmpeg_bundle" -Destination "dist/TheGmstudioTranscriber2/ffmpeg" -Recurse

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/TheGmstudioTranscriber2/* -DestinationPath TheGmstudioTranscriber2-${{ github.event.release.tag_name }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: TheGmstudioTranscriber2-${{ github.event.release.tag_name }}.zip
