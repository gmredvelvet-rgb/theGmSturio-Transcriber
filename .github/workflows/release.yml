name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: python build.py

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/TheGmstudioTranscriber2/* -DestinationPath TheGmstudioTranscriber2-${{ github.event.release.tag_name }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: TheGmstudioTranscriber2-${{ github.event.release.tag_name }}.zip
